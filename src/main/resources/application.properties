quarkus.live-reload.instrumentation=true

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL

quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

quarkus.security.users.embedded.plain-text=false
quarkus.security.users.embedded.password-hashing.algorithm=bcrypt

quarkus.devservices.enabled=true

quarkus.log.level=INFO
quarkus.log.category."br.gov.caixaverso.projeto".level=INFO

%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

quarkus.datasource.dev-ui.enabled=true
quarkus.datasource.dev-ui.allow-sql=true

mp.jwt.verify.issuer=https://quarkus.io/issuer

quarkus.smallrye-jwt.new-token.lifespan=3600

