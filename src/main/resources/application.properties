quarkus.live-reload.instrumentation=true

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL

quarkus.devservices.enabled=false

quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

quarkus.datasource.dev-ui.enabled=true
quarkus.datasource.dev-ui.allow-sql=true
